/* A clickable, hover-labelled control-number chip used throughout the app.
   Clicking jumps to that control (top-10 land on its detail; 11-20 land on
   the Control Rankings view where the extended list lives). */
function controlChip(n, opts) {
  opts = opts || {};
  const name = NAME_BY_NUM[n] || ("Control " + n);
  const size = opts.size || 24;
  const bg = opts.bg || "var(--gray-100)";
  const color = opts.color || "var(--brand-navy)";
  const border = opts.border || "var(--line-1)";
  const font = opts.font || "12.5px";
  return `<span data-control="${n}" title="Control ${n} — ${name}" style="cursor:pointer; width:${size}px; height:${size}px; display:grid; place-items:center; font-family:var(--font-mono); font-size:${font}; font-weight:700; color:${color}; background:${bg}; border:1px solid ${border}; border-radius:var(--radius-sm); transition:transform 120ms ease;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">${n}</span>`;
}

function navItem(view, iconKey, label) {
  const on = state.view === view;
  const s = on
    ? { color: "#fff", bg: "rgba(245,128,37,0.16)", shadow: "inset 3px 0 0 var(--brand-orange)", icon: "var(--brand-orange)" }
    : { color: "rgba(255,255,255,0.72)", bg: "transparent", shadow: "none", icon: "rgba(255,255,255,0.6)" };
  return `<a data-nav="${view}" style="display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:var(--radius-sm); cursor:pointer; margin-bottom:2px; font-size:14px; font-weight:600; color:${s.color}; background:${s.bg}; box-shadow:${s.shadow};">
    <span style="flex:none; color:${s.icon}; display:inline-flex;">${ICON[iconKey]}</span>
    <span>${label}</span>
  </a>`;
}

function views() {
  switch (state.view) {
    case "overview": return viewOverview();
    case "controls": return viewControls();
    case "tools": return viewTools();
    case "compare": return viewCompare();
    case "endstate": return viewEndState();
    case "progress": return viewProgress();
    default: return viewOverview();
  }
}

      <div style="display:grid; gap:10px; margin-top:10px;">${shiftRows}</div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:28px; margin-top:22px;">
      <div>
        <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3);">What to measure</div>
        <div style="display:grid; gap:8px; margin-top:10px;">${measures}</div>
      </div>
      <div>
        <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3);">Automation leverage</div>

        <a data-goto="tools" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--brand-blue); cursor:pointer; margin-top:14px;">
          <span>Compare leading vendors</span>${ICON.arrow}
        </a>
      </div>
    </div>
  </div>`;

  const extended = EXTENDED.map(e => `<div style="display:grid; grid-template-columns:42px 1fr; gap:14px; padding:15px 22px; border-top:1px solid var(--line-1);">
    <span style="font-family:var(--font-mono); font-size:18px; font-weight:600; color:var(--brand-orange); line-height:1.2;">${e.n}</span>
    <div>
      <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <span style="font-size:14.5px; font-weight:700; color:var(--fg-1);">${e.name}</span>
        <span style="font-size:10.5px; font-weight:700; color:#fff; background:var(--risk-high); padding:1px 9px; border-radius:var(--radius-pill);">High</span>
      </div>
      <div style="font-size:12.5px; color:var(--fg-2); line-height:1.5; margin-top:5px;">${e.why}</div>
      <div style="font-size:11.5px; font-weight:600; color:var(--brand-blue); margin-top:7px;">${e.layer}</div>
    </div>
  </div>`).join("");

  return `<div style="padding:28px; display:grid; gap:20px;">
    ${kpis}
    <div style="display:grid; grid-template-columns:minmax(380px,430px) 1fr; gap:20px; align-items:start;">
      <div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
        <div style="padding:16px 20px 12px;">
          <div style="font-size:15px; font-weight:700; color:var(--fg-1);">Top 10 controls by risk-reduction value</div>
          <div style="font-size:12px; color:var(--fg-3); margin-top:2px;">Select a control to see justification and required shift</div>
        </div>
        ${rankedList}
      </div>
      ${detail}
    </div>
    <div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div style="padding:18px 22px 6px;">
        <div style="font-size:15px; font-weight:700; color:var(--fg-1);">Beyond the top ten &mdash; the next High-value controls</div>
        <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">If we widen the program beyond the ten, these round out the High tier &mdash; strong risk reduction, just below the top ten. We stop before Medium/Low.</div>
      </div>
      <div style="display:grid; grid-template-columns:repeat(2,1fr);">${extended}</div>
      <div style="border-top:1px solid var(--line-1); background:var(--gray-025); padding:14px 22px; display:flex; gap:10px; align-items:flex-start;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-3)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:1px;"><circle cx="12" cy="12" r="10"></circle><path d="M8 12h8"></path></svg>
        <div style="font-size:12.5px; color:var(--fg-3); line-height:1.5;"><b style="color:var(--fg-2);">Where we stop.</b> ${MEDLOW_NOTE}</div>
      </div>
    </div>
  </div>`;
}

function kpiCard(label, value, valueColor, sub) {
  return `<div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); padding:20px;">
    <div style="font-size:13px; color:var(--fg-3); font-weight:600;">${label}</div>
    <div style="font-family:var(--font-mono); font-size:32px; font-weight:600; color:${valueColor}; letter-spacing:-0.01em; margin-top:10px;">${value}</div>
    <div style="font-size:12px; color:var(--fg-3); margin-top:6px;">${sub}</div>
  </div>`;
}

/* ---- TOOLS ---- */
function viewTools() {
  const chips = DOMAINS.map(d => {
    const on = state.filter === d.key;
    const c = on ? "#fff" : "var(--fg-2)";
    const bg = on ? "var(--brand-navy)" : "#fff";
    const line = on ? "var(--brand-navy)" : "var(--line-2)";
    return `<a data-filter="${d.key}" style="font-size:13px; font-weight:600; padding:7px 15px; border-radius:var(--radius-pill); cursor:pointer; color:${c}; background:${bg}; border:1px solid ${line};">${d.label}</a>`;
  }).join("");

  const cards = TOOLS.filter(t => state.filter === "All" || t.domain === state.filter).map(t => {
    const [cc, cbg, cln] = domainMap[t.domain] || domainMap.Validate;
    const open = !!state.open[t.id];
    const controlChips = t.controls.map(cn => `<span data-control="${cn}" title="Control ${cn} — ${NAME_BY_NUM[Number(cn)] || ("Control " + cn)}" style="cursor:pointer; font-family:var(--font-mono); font-size:12.5px; font-weight:700; color:var(--brand-orange); background:var(--brand-orange-050); border:1px solid var(--brand-orange-100); border-radius:var(--radius-xs); padding:1px 7px;">${cn}</span>`).join("");

    const body = open ? `<div style="border-top:1px solid var(--line-1); padding:20px 22px; display:grid; grid-template-columns:1.2fr 1fr 1fr; gap:28px; background:var(--gray-025);">
      <div>
        <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3);">What it does</div>
        <div style="font-size:13.5px; color:var(--fg-2); line-height:1.55; margin-top:8px;">${t.detail}</div>
        <div style="font-size:13px; color:var(--fg-1); font-weight:600; margin-top:12px;">Best fit: <span style="font-weight:400; color:var(--fg-2);">${t.fit}</span></div>
      </div>
      <div>
        <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3);">Strengths</div>
        <div style="display:grid; gap:7px; margin-top:8px;">
          ${t.strengths.map(s => `<div style="display:flex; gap:8px; align-items:flex-start;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:2px;"><path d="M20 6 9 17l-5-5"></path></svg>
            <span style="font-size:13px; color:var(--fg-2); line-height:1.45;">${s}</span></div>`).join("")}
        </div>
      </div>
      <div>
        <div style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3);">Considerations</div>
        <div style="display:grid; gap:7px; margin-top:8px;">
          ${t.considerations.map(s => `<div style="display:flex; gap:8px; align-items:flex-start;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:2px;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 20h16a2 2 0 0 0 1.73-2Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
            <span style="font-size:13px; color:var(--fg-2); line-height:1.45;">${s}</span></div>`).join("")}
        </div>
      </div>
      <div style="grid-column:1 / -1; border-top:1px solid var(--line-1); padding-top:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <span style="font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3); margin-right:2px;">References</span>
        ${t.links.map(ln => `<a href="${ln.url}" target="_blank" rel="noopener" style="font-size:12.5px; font-weight:600; color:var(--brand-blue); text-decoration:none; display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line-2); border-radius:var(--radius-pill); padding:3px 11px;">${ICON.extlink}<span>${ln.label}</span></a>`).join("")}
      </div>
    </div>` : "";

    return `<div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div data-toggle="${t.id}" style="display:grid; grid-template-columns:240px 1fr 128px 176px 26px; gap:18px; align-items:center; padding:16px 22px; cursor:pointer;">
        <div>
          <div style="font-size:16px; font-weight:700; color:var(--fg-1);">${t.name}</div>
          <span style="display:inline-block; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:${cc}; background:${cbg}; border:1px solid ${cln}; padding:1px 9px; border-radius:var(--radius-pill); margin-top:5px;">${t.cat}</span>
        </div>
        <div style="font-size:13.5px; color:var(--fg-2); line-height:1.45;">${t.tag}</div>
        <div>
          <div style="font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--fg-3);">Serves controls</div>
          <div style="display:flex; gap:5px; margin-top:5px;">${controlChips}</div>
        </div>
        <div>
          <div style="font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--fg-3);">Maturity</div>
          <div style="font-size:13.5px; font-weight:600; color:var(--fg-1); margin-top:2px;">${t.maturity}</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--fg-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:${open ? "rotate(180deg)" : "rotate(0deg)"}; transition:transform 160ms cubic-bezier(0.2,0,0,1);"><path d="m6 9 6 6 6-6"></path></svg>
      </div>
      ${body}
    </div>`;
  }).join("");

  return `<div style="padding:28px; display:grid; gap:16px; max-width:1360px;">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">${chips}</div>
    <div style="font-size:12.5px; color:var(--fg-3); margin-top:-6px;">Representative leaders per control domain &mdash; not an exhaustive list. Capabilities as reported by vendors and public sources; any shortlist is subject to diligence and model-risk review.</div>
    ${cards}
  </div>`;
}

/* ---- COMPARE ---- */
function viewCompare() {
  const legend = `<div style="display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap;">
    <div style="flex:1; min-width:280px;">
      <div style="font-size:15px; font-weight:700; color:var(--fg-1);">How the leaders compare within each category</div>
      <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">Relative standing of same-category peers &mdash; a qualitative read from public information, not a scored evaluation.</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--fg-3);">
      <span>Weaker</span>
      <div style="display:flex; gap:3px;">
        <span style="width:17px; height:13px; border-radius:3px; background:var(--gray-100);"></span>
        <span style="width:17px; height:13px; border-radius:3px; background:var(--brand-blue-050);"></span>
        <span style="width:17px; height:13px; border-radius:3px; background:var(--brand-blue-100);"></span>
        <span style="width:17px; height:13px; border-radius:3px; background:var(--brand-blue);"></span>
        <span style="width:17px; height:13px; border-radius:3px; background:var(--brand-navy);"></span>
      </div>
      <span>Stronger</span>
    </div>
  </div>`;

  const groups = COMPARE_GROUPS.map(d => {
    const rows = TOOLS.filter(t => d.keys.includes(t.domain));
    if (!rows.length) return "";
    const headerCols = compareDims.map(dim => `<span>${dim}</span>`).join("");
    const rowHtml = rows.map(t => {
      const sc = SCORES[t.id] || [3,3,3,3];
      const url = (t.links && t.links[0]) ? t.links[0].url : "#";
      const cells = compareDims.map((_, i) => {
        const sh = compareShade(sc[i]);
        return `<div style="height:38px; border-radius:var(--radius-sm); background:${sh.bg}; color:${sh.fg}; display:grid; place-items:center; font-family:var(--font-mono); font-size:14px; font-weight:600;">${sc[i]}</div>`;
      }).join("");
      return `<div style="display:grid; grid-template-columns:230px repeat(4, 1fr); gap:8px; align-items:center; padding:8px 22px; border-top:1px solid var(--line-1);">
        <div style="padding-right:12px;">
          <a href="${url}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:5px; font-size:14px; font-weight:700; color:var(--brand-blue); text-decoration:none;"><span>${t.name}</span>${ICON.extlink}</a>
          <div style="font-size:11.5px; color:var(--fg-3); margin-top:2px;">${t.maturity}</div>
        </div>
        ${cells}
      </div>`;
    }).join("");
    return `<div data-r="scrollx" style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div style="padding:14px 22px; background:var(--brand-navy); color:#fff; font-size:13px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;">${d.label}</div>
      <div style="display:grid; grid-template-columns:230px repeat(4, 1fr); gap:16px; padding:12px 22px 10px; font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--fg-3); border-bottom:1px solid var(--line-1);">
        <span>Vendor</span>${headerCols}
      </div>
      ${rowHtml}
    </div>`;
  }).join("");

  const note = `<div style="display:flex; gap:10px; align-items:flex-start; background:var(--gray-025); border:1px solid var(--line-1); border-radius:var(--radius-md); padding:14px 18px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-3)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:1px;"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
    <div style="font-size:12.5px; color:var(--fg-3); line-height:1.5;">Ratings are a relative, five-point read across peers in the same category, drawn from public information and vendor claims (see each vendor&rsquo;s references in Leading Vendors). They are a discussion aid for shortlisting, not a substitute for a formal evaluation, proof-of-value, or model-risk review.</div>
  </div>`;

  return `<div style="padding:28px; display:grid; gap:20px; max-width:1360px;">${legend}${groups}${note}</div>`;
}

/* ---- END STATE (Third-party expectations) ---- */
function viewEndState() {
  const themes = TP_THEMES.map(p => `<div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); padding:18px; display:flex; flex-direction:column;">
    <div style="font-family:var(--font-serif); font-size:17px; font-weight:700; color:var(--brand-navy); line-height:1.25;">${p.name}</div>
    <div style="font-size:13px; color:var(--fg-2); line-height:1.5; margin-top:8px; flex:1;">${p.body}</div>
    <div style="font-family:var(--font-mono); font-size:11.5px; color:var(--fg-3); margin-top:12px;">${p.refs}</div>
  </div>`).join("");

  const tiers = TP_TIERS.map(t => `<div style="border:1px solid var(--line-1); border-radius:var(--radius-sm); border-top:3px solid ${t.accent}; padding:16px 18px;">
    <div style="font-size:14px; font-weight:700; color:var(--fg-1);">${t.tier}</div>
    <div style="font-size:12.5px; color:var(--fg-3); line-height:1.45; margin-top:6px;">${t.scope}</div>
    <div style="font-size:13px; color:var(--fg-2); line-height:1.5; margin-top:10px; padding-top:10px; border-top:1px solid var(--line-1);">${t.expect}</div>
  </div>`).join("");

  const surveyRows = VENDORS.map(v => {
    const [sc, sbg, sln] = scopeMap[v.scope] || scopeMap["All tiers"];
    return `<div style="display:grid; grid-template-columns:1.15fr 1.1fr 0.95fr 0.8fr; gap:20px; align-items:start; padding:13px 22px; border-top:1px solid var(--line-1);">
      <div>
        <span style="display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:${sc}; background:${sbg}; border:1px solid ${sln}; padding:1px 8px; border-radius:var(--radius-pill); margin-bottom:6px;">${v.scope}</span>
        <div style="font-size:13.5px; font-weight:600; color:var(--fg-1); line-height:1.45;">${v.ask}</div>
      </div>
      <span style="font-size:13px; color:var(--fg-2); line-height:1.45;">${v.good}</span>
      <span style="font-size:13px; color:var(--fg-2); line-height:1.45;">${v.hold}</span>
      <span style="font-size:13px; color:var(--risk-high); line-height:1.45;">${v.flag}</span>
    </div>`;
  }).join("");

  const lifecycle = TP_LIFECYCLE.map(s => `<div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); padding:18px 20px;">
    <div style="display:flex; align-items:center; gap:9px;">
      <span style="font-family:var(--font-mono); font-size:12px; font-weight:700; color:#fff; background:var(--brand-orange); border-radius:var(--radius-xs); padding:1px 7px;">${s.n}</span>
      <div style="font-size:14px; font-weight:700; color:var(--fg-1);">${s.step}</div>
    </div>
    <div style="font-size:13px; color:var(--fg-2); line-height:1.5; margin-top:10px;">${s.body}</div>
  </div>`).join("");

  const reciprocal = RECIPROCAL.map(r => `<div style="display:grid; grid-template-columns:220px 1fr 1.35fr; gap:24px; align-items:start; padding:15px 24px; border-top:1px solid var(--line-1);">
    <div style="font-size:14px; font-weight:700; color:var(--brand-navy); border-left:3px solid var(--brand-orange); padding-left:13px; line-height:1.3;">${r.theme}</div>
    <div style="font-size:13px; color:var(--fg-2); line-height:1.5;">${r.require}</div>
    <div style="display:flex; gap:9px; align-items:flex-start;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--brand-orange)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:3px;"><path d="M20 6 9 17l-5-5"></path></svg>
      <span style="font-size:13.5px; color:var(--fg-1); font-weight:600; line-height:1.45;">${r.demonstrate}</span>
    </div>
  </div>`).join("");

  return `<div style="padding:28px; display:grid; gap:20px; max-width:1400px;">

    <div style="background:var(--brand-navy); color:#fff; border-radius:var(--radius-md); padding:28px 32px;">
      <div style="font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--brand-orange);">Third-party &amp; vendor risk</div>
      <div style="font-family:var(--font-serif); font-size:26px; font-weight:700; line-height:1.25; margin-top:10px; max-width:960px;">Frontier AI risk extends to everyone who touches our data &mdash; our controls are only as strong as our weakest third party.</div>
      <div style="font-size:14px; line-height:1.6; color:rgba(255,255,255,0.82); margin-top:12px; max-width:960px;">The same bar we set for ourselves is what we should expect from third parties. Expectations rise with the sensitivity of the data they touch and how much we depend on them. This is what &ldquo;good&rdquo; looks like &mdash; and what to hold them accountable for.</div>
    </div>

    <div>
      <div style="font-size:16px; font-weight:700; color:var(--fg-1);">What we expect from third parties</div>
      <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">Five expectations, each drawn from our own ranked controls</div>
      <div style="display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:14px; margin-top:14px;">${themes}</div>
    </div>

    <div style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); padding:20px 24px;">
      <div style="font-size:16px; font-weight:700; color:var(--fg-1);">Expectations scale with access</div>
      <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">How far we push depends on the data a third party touches and our dependence on them</div>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:16px;">${tiers}</div>
    </div>

    <div data-r="scrollx" style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div style="padding:16px 22px 12px;">
        <div style="font-size:16px; font-weight:700; color:var(--fg-1);">The survey &mdash; what to ask and what to hold them to</div>
        <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">Scoped by vendor tier &mdash; the response that counts, how we make it stick, and the answer that should stop the deal. Continuous testing focuses on critical vendors; lighter tiers rely on attestation.</div>
      </div>
      <div style="display:grid; grid-template-columns:1.15fr 1.1fr 0.95fr 0.8fr; gap:20px; padding:8px 22px 10px; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--fg-3);">
        <span>What we ask</span><span>What good sounds like</span><span>Hold them to it</span><span style="color:var(--risk-high);">Red flag</span>
      </div>
      ${surveyRows}
    </div>

    <div>
      <div style="font-size:16px; font-weight:700; color:var(--fg-1);">Holding them to it across the relationship</div>
      <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">Expectations are enforced at every stage &mdash; not just at onboarding</div>
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:14px;">${lifecycle}</div>
    </div>

    <div style="background:var(--brand-navy); color:#fff; border-radius:var(--radius-md); padding:26px 32px; margin-top:4px;">
      <div style="font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--brand-orange);">When the tables turn</div>
      <div style="font-family:var(--font-serif); font-size:24px; font-weight:700; line-height:1.25; margin-top:10px; max-width:960px;">The bar we set is the bar we&rsquo;re held to.</div>
      <div style="font-size:14px; line-height:1.6; color:rgba(255,255,255,0.82); margin-top:12px; max-width:960px;">We are a third party to our own institutional clients and partners &mdash; the same questions we ask, they ask of us. Every expectation above has a mirror: the evidence we must keep exam-ready to demonstrate in return.</div>
    </div>
    <div data-r="scrollx" style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div style="display:grid; grid-template-columns:220px 1fr 1.35fr; gap:24px; padding:13px 24px 11px; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--fg-3); border-bottom:1px solid var(--line-1);">
        <span>Expectation</span><span>What we require of third parties</span><span style="color:var(--brand-orange);">What we must demonstrate in return</span>
      </div>
      ${reciprocal}
      <div style="border-top:1px solid var(--line-1); background:var(--gray-025); padding:14px 24px; display:flex; gap:10px; align-items:flex-start;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-3)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:1px;"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
        <div style="font-size:12.5px; color:var(--fg-3); line-height:1.5;">Packaged for client due diligence: a SOC 2 Type II report, ISO 27001 certification, and a completed SIG / CAIQ questionnaire &mdash; kept current so the answers we give match the bar we hold others to.</div>
      </div>
    </div>
  </div>`;
}

/* ---- PROGRESS (Desired end state) ---- */
function viewProgress() {
  const pillars = PILLARS.map(p => `<div style="display:grid; grid-template-columns:236px 1fr 1fr 128px; gap:22px; align-items:start; padding:17px 24px; border-top:1px solid var(--line-1);">
    <div style="font-family:var(--font-serif); font-size:17px; font-weight:700; color:var(--brand-navy); line-height:1.25; border-left:3px solid var(--brand-orange); padding-left:13px;">${p.name}</div>
    <div style="font-size:13.5px; color:var(--fg-1); line-height:1.5;">${p.state}</div>
    <div style="font-size:13px; color:var(--fg-2); line-height:1.5;">${p.evidence}</div>
    <div style="display:flex; flex-wrap:wrap; gap:6px;">
      ${p.ctrls.map(cn => controlChip(Number(cn), { size: 26, font: "13px" })).join("")}
    </div>
  </div>`).join("");

  const evidenceItem = (e, icon) => `<div style="display:flex; gap:10px; align-items:flex-start;">
    ${icon}
    <div style="font-size:13px; color:var(--fg-2); line-height:1.45;"><b style="color:var(--fg-1); font-weight:700;">${e.a}</b> &mdash; ${e.d}</div></div>`;
  const anchorIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--brand-blue)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:3px;"><path d="M20 6 9 17l-5-5"></path></svg>';
  const buildIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--brand-orange)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="flex:none; margin-top:3px;"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>';

  const audiences = AUDIENCES.map(a => `<div style="display:grid; grid-template-columns:180px 0.8fr 1.15fr 1.3fr; gap:24px; align-items:start; padding:18px 24px; border-top:1px solid var(--line-1);">
    <div style="border-left:3px solid var(--brand-orange); padding-left:14px;">
      <div style="font-size:16px; font-weight:700; color:var(--brand-navy); line-height:1.2;">${a.audience}</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); margin-top:6px; line-height:1.4;">${a.cadence}</div>
    </div>
    <div style="font-family:var(--font-serif); font-size:16px; font-weight:600; color:var(--fg-1); line-height:1.3; font-style:italic;">&ldquo;${a.question}&rdquo;</div>
    <div style="display:grid; gap:11px;">${a.anchors.map(e => evidenceItem(e, anchorIcon)).join("")}</div>
    <div style="display:grid; gap:11px;">${a.build.map(e => evidenceItem(e, buildIcon)).join("")}</div>
  </div>`).join("");

  const assuranceGap = `<div style="background:#fff; border:1px solid var(--line-1); border-top:3px solid var(--brand-orange); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); padding:20px 24px;">
    <div style="font-size:15px; font-weight:700; color:var(--fg-1);">Where assurance comes from when no standard exists yet</div>
    <div style="font-size:13.5px; color:var(--fg-2); line-height:1.6; margin-top:8px; max-width:1080px;">There is no dedicated frontier AI standard today &mdash; no exam workbook, no certification, no peer benchmark. That does not make independent assurance impossible; it changes what evidence anchors to. It rests on three foundations: <b style="color:var(--fg-1);">existing authorities</b> where they already reach (FFIEC and cybersecurity expectations, SR 11-7 for models, SOC 2 / ISO 27001 for clients); <b style="color:var(--fg-1);">our own published control standard</b> &mdash; the ten controls with quantitative targets &mdash; which gives internal audit and external assessors a benchmark to test against; and <b style="color:var(--fg-1);">exploit-validated technical evidence</b>, which proves posture directly and needs no framework to interpret. Until external standards mature, our standard is the standard &mdash; publishing it, measuring against it, and inviting independent challenge to it is the work.</div>
  </div>`;

  return `<div style="padding:28px; display:grid; gap:20px; max-width:1400px;">
    <div style="background:var(--brand-navy); color:#fff; border-radius:var(--radius-md); padding:28px 32px;">
      <div style="font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--brand-orange);">The destination</div>
      <div style="font-family:var(--font-serif); font-size:26px; font-weight:700; line-height:1.25; margin-top:10px; max-width:960px;">The desired end state &mdash; five statements that define &ldquo;done.&rdquo;</div>
      <div style="font-size:14px; line-height:1.6; color:rgba(255,255,255,0.82); margin-top:12px; max-width:960px;">If we can say each of these with evidence, the frontier AI risk is inside appetite. Every ranked control rolls up to one of them &mdash; and each is written so it can be held to evidence, not activity.</div>
    </div>
    <div data-r="scrollx" style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div style="display:grid; grid-template-columns:236px 1fr 1fr 128px; gap:22px; padding:15px 24px 11px; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--fg-3);">
        <span>Pillar</span><span>What &ldquo;done&rdquo; means</span><span>How we&rsquo;d know it&rsquo;s true</span><span>Controls</span>
      </div>
      ${pillars}
    </div>
    <div style="margin-top:4px;">
      <div style="font-size:16px; font-weight:700; color:var(--fg-1);">The evidence each audience needs &mdash; and what we must build to produce it</div>
      <div style="font-size:12.5px; color:var(--fg-3); margin-top:2px;">For each audience: the question they ask, what already exists to anchor the answer, and the outcomes technology leadership must build where no standard yet reaches</div>
    </div>
    ${assuranceGap}
    <div data-r="scrollx" style="background:#fff; border:1px solid var(--line-1); border-radius:var(--radius-md); box-shadow:var(--shadow-xs); overflow:hidden;">
      <div style="display:grid; grid-template-columns:180px 0.8fr 1.15fr 1.3fr; gap:24px; padding:13px 24px 11px; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--fg-3); border-bottom:1px solid var(--line-1);">
        <span>Audience</span><span>The question they ask</span><span style="color:var(--brand-blue);">What exists to anchor it today</span><span style="color:var(--brand-orange);">What we must build</span>
      </div>
      ${audiences}
    </div>
  </div>`;
}

/* ========================================================================== *
 *  ===== SEARCH =====                                                        *
 * ========================================================================== */

/* Both the desktop header input and the mobile search input share state.query. */
function searchInputs() { return ["search-input", "search-input-m"].map(id => document.getElementById(id)).filter(Boolean); }
function searchBoxes() { return ["search-dropdown", "search-dropdown-m"].map(id => document.getElementById(id)).filter(Boolean); }

function wireHeader() {
  searchInputs().forEach(input => {
    input.value = state.query || "";
    input.addEventListener("input", () => { state.query = input.value; updateSearchDropdown(); });
    input.addEventListener("focus", updateSearchDropdown);
    input.addEventListener("keydown", (e) => { if (e.key === "Escape") { state.query = ""; input.value = ""; closeSearch(); } });
  });
}

function closeSearch() {
  searchBoxes().forEach(box => { box.style.display = "none"; box.innerHTML = ""; });
}

function updateSearchDropdown() {
  const boxes = searchBoxes();
  if (!boxes.length) return;
  const q = (state.query || "").trim().toLowerCase();
  if (!q) { closeSearch(); return; }

  const controlHits = CONTROLS
    .filter(c => (c.name + " " + c.tag + " " + c.why).toLowerCase().includes(q))
    .map(c => ({ kind: "control", n: c.rank, name: c.name, sub: c.value + " · " + c.tag }));
  const extHits = EXTENDED
    .filter(e => (e.name + " " + e.why + " " + e.layer).toLowerCase().includes(q))
    .map(e => ({ kind: "control", n: Number(e.n), name: e.name, sub: "High · " + e.layer }));
  const vendorHits = TOOLS
    .filter(t => (t.name + " " + t.tag + " " + t.detail).toLowerCase().includes(q))
    .map(t => ({ kind: "vendor", id: t.id, name: t.name, sub: t.cat + " · serves " + t.controls.join(", ") }));

  const group = (label, items) => items.length ? `<div style="padding:8px 14px 4px; font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-3); background:var(--gray-025);">${label}</div>` + items.map(it => {
    const attr = it.kind === "control" ? `data-control="${it.n}"` : `data-vendor="${it.id}"`;
    const badge = it.kind === "control"
      ? `<span style="font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--brand-orange); flex:none; width:26px;">${it.n}</span>`
      : `<span style="flex:none; width:26px; color:var(--brand-blue);">${ICON.grid}</span>`;
    return `<div ${attr} style="cursor:pointer; display:flex; gap:8px; align-items:center; padding:9px 14px; border-top:1px solid var(--line-1);" onmouseover="this.style.background='var(--brand-blue-050)'" onmouseout="this.style.background='#fff'">
      ${badge}
      <div style="min-width:0;">
        <div style="font-size:13.5px; font-weight:600; color:var(--fg-1);">${it.name}</div>
        <div style="font-size:11.5px; color:var(--fg-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${it.sub}</div>
      </div>
    </div>`;
  }).join("") : "";

  const total = controlHits.length + extHits.length + vendorHits.length;
  const html = total
    ? group("Controls", controlHits.concat(extHits)) + group("Vendors", vendorHits)
    : `<div style="padding:16px; font-size:13px; color:var(--fg-3);">No matches for &ldquo;${state.query}&rdquo;</div>`;
  boxes.forEach(box => { box.innerHTML = html; box.style.display = "block"; });
}

/* ========================================================================== *
 *  ===== DEEP LINKS (URL hash) =====                                         *
 * ========================================================================== */

const VALID_VIEWS = ["overview", "controls", "tools", "compare", "endstate", "progress"];

function writeHash() {
  let h = "#/" + state.view;
  if (state.view === "controls") h += "/" + state.selected;
  else if (state.view === "tools" && state.filter !== "All") h += "/" + encodeURIComponent(state.filter);
  if (location.hash !== h) location.hash = h;
}

function readHash() {
  const raw = location.hash.replace(/^#\/?/, "");
  if (!raw) return;
  const parts = raw.split("/");
  if (!VALID_VIEWS.includes(parts[0])) return;
  state.view = parts[0];
  if (state.view === "controls" && parts[1]) {
    const n = Number(parts[1]);
    if (n >= 1 && n <= 10) state.selected = n;
  }
  if (state.view === "tools" && parts[1]) state.filter = decodeURIComponent(parts[1]);
}

window.addEventListener("hashchange", () => {
  const before = state.view + "|" + state.selected + "|" + state.filter;
  readHash();
  const after = state.view + "|" + state.selected + "|" + state.filter;
  if (before !== after) render();
});

/* ========================================================================== *
 *  ===== EVENT DELEGATION =====                                              *
 * ========================================================================== */

document.addEventListener("click", (e) => {
  // Mobile: toggle the nav drawer.
  const menuToggle = e.target.closest("[data-menu-toggle]");
  if (menuToggle) { setState({ menuOpen: !state.menuOpen, searchOpen: false }); return; }

  // Mobile: toggle the search panel (and focus it when opening).
  const searchToggle = e.target.closest("[data-search-toggle]");
  if (searchToggle) {
    const willOpen = !state.searchOpen;
    setState({ searchOpen: willOpen, menuOpen: false });
    if (willOpen) { const mi = document.getElementById("search-input-m"); if (mi) mi.focus(); }
    return;
  }

  const nav = e.target.closest("[data-nav]");
  if (nav) { setState({ view: nav.getAttribute("data-nav"), query: "", menuOpen: false, searchOpen: false }); return; }

  const goto = e.target.closest("[data-goto]");
  if (goto) { setState({ view: goto.getAttribute("data-goto"), query: "", menuOpen: false, searchOpen: false }); return; }

  // Cross-link: jump to a control from any numbered chip (top-10 open detail).
  const ctrl = e.target.closest("[data-control]");
  if (ctrl) {
    const n = Number(ctrl.getAttribute("data-control"));
    const base = { query: "", menuOpen: false, searchOpen: false };
    setState(n >= 1 && n <= 10 ? Object.assign({ view: "controls", selected: n }, base) : Object.assign({ view: "controls" }, base));
    return;
  }

  // Cross-link: jump to a vendor card and expand it.
  const vendor = e.target.closest("[data-vendor]");
  if (vendor) {
    const id = vendor.getAttribute("data-vendor");
    setState({ view: "tools", filter: "All", open: Object.assign({}, state.open, { [id]: true }), query: "", menuOpen: false, searchOpen: false });
    const el = document.querySelector('[data-toggle="' + id + '"]');
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  const pick = e.target.closest("[data-pick]");
  if (pick) { setState({ selected: Number(pick.getAttribute("data-pick")) }); return; }

  const filter = e.target.closest("[data-filter]");
  if (filter) { setState({ filter: filter.getAttribute("data-filter") }); return; }

  const toggle = e.target.closest("[data-toggle]");
  if (toggle) {
    const id = toggle.getAttribute("data-toggle");
    setState({ open: Object.assign({}, state.open, { [id]: !state.open[id] }) });
    return;
  }

  // Click outside the search boxes closes the results dropdown.
  if (!e.target.closest("#search-wrap") && !e.target.closest(".m-search")) closeSearch();
});

readHash();
render();
</script>
